name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    name: Format and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check formatting and lint
        run: ./gradlew spotlessCheck --no-daemon -PverboseTests=false

  common:
    name: Common
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test common
        run: ./gradlew :common:check --no-daemon -PverboseTests=false

  platform:
    name: Build ${{ matrix.label }}
    needs: common
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: paper
            label: Paper
          - platform: fabric
            label: Fabric
          - platform: neoforge
            label: NeoForge
          - platform: forge
            label: Forge

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test ${{ matrix.label }}
        run: ./gradlew :${{ matrix.platform }}:build --no-daemon -PverboseTests=false

      - name: Resolve runtime artifact
        id: runtime-artifact
        shell: bash
        run: |
          jar="$(find "${{ matrix.platform }}/build/libs" -maxdepth 1 -type f -name "clutchperms-${{ matrix.platform }}-*.jar" ! -name "*-sources.jar" | sort | head -n 1)"
          test -n "$jar"
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar" .jar)" >> "$GITHUB_OUTPUT"
          ls -lh "$jar"

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.runtime-artifact.outputs.name }}
          path: ${{ steps.runtime-artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 14
